<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name | UE C++ Developer</title>

  <!-- Google Fonts: Rajdhani (headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#0D47A1',
            'off-white': '#FAFAFA',
          },
          fontFamily: {
            heading: ['Rajdhani', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Custom Styles -->
  <style>
    html {
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #0D47A1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #0a3a8a;
    }

    /* Firefox scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: #0D47A1 #f1f1f1;
    }
  </style>
</head>
<body class="bg-[#FAFAFA] font-['Inter'] text-gray-800">

  <nav id="navbar" class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <!-- Logo / Name -->
        <a href="#hero" class="font-heading text-2xl font-bold text-accent tracking-wide">
          YourName
        </a>

        <!-- Desktop Nav Links -->
        <div class="hidden md:flex items-center space-x-8">
          <a href="#hero" class="nav-link text-sm font-medium text-gray-600 hover:text-accent transition-colors duration-200">Home</a>
          <a href="#about" class="nav-link text-sm font-medium text-gray-600 hover:text-accent transition-colors duration-200">About</a>
          <a href="#projects" class="nav-link text-sm font-medium text-gray-600 hover:text-accent transition-colors duration-200">Projects</a>
          <a href="#contact" class="nav-link text-sm font-medium text-gray-600 hover:text-accent transition-colors duration-200">Contact</a>
        </div>

        <!-- Hamburger Button (mobile) -->
        <button id="hamburger-btn" class="md:hidden flex flex-col justify-center items-center w-10 h-10 space-y-1.5 focus:outline-none" aria-label="Toggle navigation menu">
          <span class="hamburger-line block w-6 h-0.5 bg-gray-800 transition-all duration-300"></span>
          <span class="hamburger-line block w-6 h-0.5 bg-gray-800 transition-all duration-300"></span>
          <span class="hamburger-line block w-6 h-0.5 bg-gray-800 transition-all duration-300"></span>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden bg-white/95 backdrop-blur-md border-b border-gray-200">
      <div class="px-4 py-4 space-y-3">
        <a href="#hero" class="nav-link block text-base font-medium text-gray-600 hover:text-accent transition-colors duration-200 py-2">Home</a>
        <a href="#about" class="nav-link block text-base font-medium text-gray-600 hover:text-accent transition-colors duration-200 py-2">About</a>
        <a href="#projects" class="nav-link block text-base font-medium text-gray-600 hover:text-accent transition-colors duration-200 py-2">Projects</a>
        <a href="#contact" class="nav-link block text-base font-medium text-gray-600 hover:text-accent transition-colors duration-200 py-2">Contact</a>
      </div>
    </div>
  </nav>

  <section id="hero" class="relative min-h-screen flex items-center justify-center overflow-hidden pt-16">
    <!-- Animated canvas background -->
    <canvas id="hero-canvas" class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 0;"></canvas>

    <!-- Hero content -->
    <div class="relative z-10 text-center px-4">
      <h1 class="font-heading text-5xl md:text-7xl font-bold text-gray-900 mb-4">
        Your Name
      </h1>
      <p class="font-heading text-xl md:text-2xl text-accent font-semibold mb-3">
        Unreal Engine C++ Developer
      </p>
      <p class="font-body text-lg text-gray-600 mb-8 max-w-xl mx-auto">
        Building immersive game experiences with C++ and Unreal Engine
      </p>
      <a
        href="#projects"
        class="inline-block border-2 border-accent text-accent font-medium px-8 py-3 rounded-lg hover:bg-accent hover:text-white transition-all duration-300"
      >
        View Projects
      </a>
    </div>
  </section>

  <section id="about"></section>

  <section id="projects"></section>

  <section id="contact"></section>

  <footer></footer>

  <script>
    // --- Hamburger Toggle ---
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    hamburgerBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    // --- Smooth Scroll & Close Mobile Menu on Link Click ---
    const navLinks = document.querySelectorAll('.nav-link');

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('href');
        const targetEl = document.querySelector(targetId);

        if (targetEl) {
          targetEl.scrollIntoView({ behavior: 'smooth' });
        }

        // Close mobile menu after clicking a link
        mobileMenu.classList.add('hidden');
      });
    });

    // --- Active Link Highlighting via IntersectionObserver ---
    const sections = document.querySelectorAll('section[id]');

    function setActiveLink(id) {
      navLinks.forEach(link => {
        if (link.getAttribute('href') === '#' + id) {
          link.classList.remove('text-gray-600');
          link.classList.add('text-accent', 'font-semibold');
        } else {
          link.classList.remove('text-accent', 'font-semibold');
          link.classList.add('text-gray-600');
        }
      });
    }

    const observerOptions = {
      root: null,
      rootMargin: '-20% 0px -70% 0px',
      threshold: 0,
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setActiveLink(entry.target.id);
        }
      });
    }, observerOptions);

    sections.forEach(section => observer.observe(section));

    // --- Hero Canvas Animation: Grid + Particles ---
    (function () {
      const canvas = document.getElementById('hero-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      let width, height, dpr;
      const GRID_SPACING = 50;
      const PARTICLE_COUNT = 22;
      const particles = [];

      // Resize canvas with devicePixelRatio for crisp rendering
      function resizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        width = rect.width;
        height = rect.height;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      // Initialize particles
      function initParticles() {
        particles.length = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            size: 2 + Math.random() * 2,
            opacity: 0.06 + Math.random() * 0.06,
          });
        }
      }

      // Draw the perspective grid with breathing pulse
      function drawGrid(time) {
        const pulse = Math.sin(time * 0.001) * 0.03;
        const baseOpacity = 0.08 + pulse;
        const centerX = width / 2;
        const centerY = height / 2;
        const maxDist = Math.sqrt(centerX * centerX + centerY * centerY);

        ctx.lineWidth = 1;

        // Vertical lines
        for (let x = 0; x <= width; x += GRID_SPACING) {
          const dist = Math.abs(x - centerX) / centerX;
          const fade = 1 - dist * 0.7;
          const alpha = Math.max(0, baseOpacity * fade);
          ctx.strokeStyle = 'rgba(13, 71, 161, ' + alpha.toFixed(4) + ')';
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, height);
          ctx.stroke();
        }

        // Horizontal lines
        for (let y = 0; y <= height; y += GRID_SPACING) {
          const dist = Math.abs(y - centerY) / centerY;
          const fade = 1 - dist * 0.7;
          const alpha = Math.max(0, baseOpacity * fade);
          ctx.strokeStyle = 'rgba(13, 71, 161, ' + alpha.toFixed(4) + ')';
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }
      }

      // Update and draw particles
      function drawParticles() {
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];

          // Update position
          p.x += p.vx;
          p.y += p.vy;

          // Wrap around edges
          if (p.x < -p.size) p.x = width + p.size;
          if (p.x > width + p.size) p.x = -p.size;
          if (p.y < -p.size) p.y = height + p.size;
          if (p.y > height + p.size) p.y = -p.size;

          // Draw diamond shape
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(Math.PI / 4);
          ctx.fillStyle = 'rgba(13, 71, 161, ' + p.opacity.toFixed(4) + ')';
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
        }
      }

      // Main animation loop
      let animId;
      function animate(time) {
        // Skip rendering when tab is hidden
        if (document.hidden) {
          animId = requestAnimationFrame(animate);
          return;
        }

        ctx.clearRect(0, 0, width, height);
        drawGrid(time);
        drawParticles();
        animId = requestAnimationFrame(animate);
      }

      // Setup
      resizeCanvas();
      initParticles();
      animId = requestAnimationFrame(animate);

      // Handle resize
      window.addEventListener('resize', function () {
        resizeCanvas();
        initParticles();
      });
    })();
  </script>

</body>
</html>
