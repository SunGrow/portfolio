<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name | UE C++ Developer</title>

  <!-- Google Fonts: Rajdhani (headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: '#0D47A1',
            'off-white': '#FAFAFA',
          },
          fontFamily: {
            heading: ['Rajdhani', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Custom Styles -->
  <style>
    html {
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #0D47A1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #0a3a8a;
    }

    /* Firefox scrollbar */
    * {
      scrollbar-width: thin;
      scrollbar-color: #0D47A1 #f1f1f1;
    }
  </style>
</head>
<body class="bg-[#FAFAFA] font-['Inter'] text-gray-800">

  <nav id="navbar"></nav>

  <section id="hero"></section>

  <section id="about"></section>

  <section id="projects"></section>

  <section id="contact"></section>

  <footer></footer>

</body>
</html>
